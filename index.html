<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#12161c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="shortcut icon" href="favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<title>NODO — merge survivor</title>
<style>
  :root{
    --bg:#12161c;
    --panel:#1b212b;
    --cell:#232b38;
    --cell-border:#2f3948;
    --amber:#e0a458;
    --teal:#4fd1c5;
    --danger:#d9634f;
    --text:#e8e6df;
    --text-dim:#8b93a1;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0;padding:0;min-height:100vh;
    min-height:100dvh;
    background:var(--bg);
    color:var(--text);
    font-family:'Segoe UI',system-ui,sans-serif;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
    overflow-x:hidden;
    overscroll-behavior:contain;
    touch-action:manipulation;
  }
  #app{
    width:100%;max-width:420px;
    margin:0 auto;
    padding:18px;
  }
  .hud{
    display:flex;justify-content:space-between;align-items:baseline;
    margin-bottom:10px;
    font-family:'Consolas','Courier New',monospace;
  }
  .hud .label{font-size:10px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;}
  .hud .value{font-size:20px;font-weight:700;color:var(--text);}
  .hud .lives{color:var(--danger);font-size:16px;letter-spacing:2px;}

  .wavebar-wrap{
    height:6px;background:var(--panel);border-radius:3px;overflow:hidden;
    margin-bottom:4px;border:1px solid var(--cell-border);
  }
  .wavebar{
    height:100%;width:100%;background:linear-gradient(90deg,var(--teal),var(--amber));
    transform:scaleX(0);transform-origin:left center;
    will-change:transform;
  }
  .powerline{
    display:flex;justify-content:space-between;
    font-family:'Consolas','Courier New',monospace;
    font-size:11px;color:var(--text-dim);margin-bottom:14px;
  }
  .powerline b{color:var(--amber);font-weight:700;}

  #grid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    grid-template-rows:repeat(5,1fr);
    gap:6px;
    background:var(--panel);
    padding:8px;
    border-radius:10px;
    border:1px solid var(--cell-border);
    position:relative;
    aspect-ratio:1/1;
  }
  .cell{
    background:var(--cell);
    border:1px solid var(--cell-border);
    border-radius:8px;
    display:flex;align-items:center;justify-content:center;
    font-family:'Consolas','Courier New',monospace;
    font-weight:700;
    font-size:clamp(16px, 5.5vw, 26px);
    cursor:pointer;
    position:relative;
    transition:background .15s ease;
    touch-action:manipulation;
  }
  .cell.empty:hover{background:#28303e;}
  .cell.filled{cursor:default;}
  .cell.pulse{animation:pulse .28s ease;}
  @keyframes pulse{
    0%{transform:scale(1);}
    40%{transform:scale(1.15);}
    100%{transform:scale(1);}
  }
  .cell.flash-out{animation:flashOut .35s ease forwards;}
  @keyframes flashOut{
    0%{opacity:1;transform:scale(1);}
    100%{opacity:0;transform:scale(.6);}
  }

  .tier1{color:#9fb4d0;}
  .tier2{color:#7fd1c1;}
  .tier3{color:var(--teal);}
  .tier4{color:#e0d158;}
  .tier5{color:var(--amber);}
  .tier6{color:var(--danger);}
  .tier7{color:#f06fb0;}

  .bottom{
    display:flex;align-items:center;justify-content:space-between;
    margin-top:14px;
  }
  .next-wrap{display:flex;align-items:center;gap:10px;}
  .next-label{font-size:10px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;}
  .next-tile{
    width:42px;height:42px;border-radius:8px;
    background:var(--cell);border:1px solid var(--cell-border);
    display:flex;align-items:center;justify-content:center;
    font-family:'Consolas','Courier New',monospace;font-weight:700;font-size:18px;
  }
  #msg{
    font-size:12px;color:var(--text-dim);text-align:right;min-height:16px;
  }

  .overlay{
    position:fixed;inset:0;
    background:rgba(10,13,17,.82);
    backdrop-filter:blur(2px);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:20px;
    padding-top:calc(20px + env(safe-area-inset-top));
    padding-bottom:calc(20px + env(safe-area-inset-bottom));
    z-index:50;
    overflow-y:auto;
  }
  .overlay-card{
    background:var(--panel);
    border:1px solid var(--cell-border);
    border-radius:14px;
    box-shadow:0 20px 50px rgba(0,0,0,.5);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:14px;padding:24px 20px;text-align:center;
    width:100%;max-width:380px;
    max-height:calc(100dvh - 40px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
    overflow-y:auto;
  }
  .overlay h2{margin:0;font-size:16px;letter-spacing:1px;color:var(--amber);}
  .overlay p{margin:0;font-size:12px;color:var(--text-dim);line-height:1.5;}
  .choice-row{display:flex;gap:10px;width:100%;}
  .choice-btn{
    flex:1;background:var(--cell);border:1px solid var(--cell-border);
    color:var(--text);border-radius:8px;padding:12px 8px;
    font-family:inherit;font-size:12px;cursor:pointer;line-height:1.4;
    touch-action:manipulation;
  }
  .choice-btn:hover{border-color:var(--teal);}
  .choice-btn b{display:block;color:var(--teal);font-size:13px;margin-bottom:4px;}
  .restart-btn{
    background:var(--teal);color:#0f1520;border:none;border-radius:8px;
    padding:12px 22px;font-weight:700;cursor:pointer;font-size:14px;
    touch-action:manipulation;min-height:44px;
  }
  .title{
    font-size:11px;letter-spacing:4px;color:var(--text-dim);
    text-align:center;text-transform:uppercase;
  }
  .title-row{
    position:relative;
    display:flex;justify-content:center;align-items:center;
    margin-bottom:2px;
  }
  .help-btn{
    position:absolute;right:0;top:50%;transform:translateY(-50%);
    width:30px;height:30px;border-radius:50%;
    background:var(--cell);border:1px solid var(--cell-border);
    color:var(--text-dim);font-family:inherit;font-size:13px;font-weight:700;
    cursor:pointer;line-height:1;touch-action:manipulation;
  }
  .help-btn:hover{border-color:var(--teal);color:var(--teal);}

  .howto-list{
    text-align:left;width:100%;
    display:flex;flex-direction:column;gap:10px;
    font-size:12px;color:var(--text);line-height:1.5;
  }
  .howto-list .item{display:flex;gap:10px;align-items:flex-start;}
  .howto-list .icon{font-size:16px;flex-shrink:0;width:20px;text-align:center;}
  .howto-list b{color:var(--teal);}
  h1{
    font-size:22px;text-align:center;margin:0 0 14px 0;letter-spacing:1px;
    font-weight:700;
  }
  h1 span{color:var(--teal);}

  .layout{
    padding:18px;
    padding-top:calc(18px + env(safe-area-inset-top));
    padding-bottom:calc(18px + env(safe-area-inset-bottom));
    padding-left:calc(18px + env(safe-area-inset-left));
    padding-right:calc(18px + env(safe-area-inset-right));
  }
  #app{width:100%;max-width:420px;margin:0 auto;padding:0;}

  #leaderboard{
    width:260px;
    background:var(--panel);
    border-left:2px solid var(--teal);
    border-radius:10px;
    padding:16px;
    box-shadow:0 12px 34px rgba(0,0,0,.45);
    position:fixed;
    top:50%;
    right:28px;
    transform:translateY(-50%);
    max-height:78vh;
    overflow-y:auto;
  }
  #leaderboard h2{
    margin:0 0 2px 0;font-size:13px;letter-spacing:2px;
    text-transform:uppercase;color:var(--text);
  }
  #leaderboard .sub{
    font-size:10px;color:var(--text-dim);margin-bottom:12px;line-height:1.5;
  }
  .lb-row{
    display:flex;align-items:center;gap:8px;
    padding:7px 6px;border-radius:6px;
    font-family:'Consolas','Courier New',monospace;font-size:12px;
  }
  .lb-row.me{background:rgba(79,209,197,.12);border:1px solid rgba(79,209,197,.4);}
  .lb-rank{width:22px;flex-shrink:0;text-align:center;color:var(--text-dim);font-size:13px;}
  .lb-rank.medal{font-size:16px;}
  .lb-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .lb-rating{color:var(--amber);font-weight:700;}
  .lb-meta{font-size:9px;color:var(--text-dim);}
  #lbEmpty{font-size:11px;color:var(--text-dim);text-align:center;padding:10px 0;}
  #lbStatus{font-size:10px;color:var(--text-dim);text-align:center;padding-top:8px;}

  .whoami{
    display:flex;justify-content:space-between;align-items:center;
    font-size:11px;color:var(--text-dim);margin-bottom:10px;
  }
  .whoami b{color:var(--teal);}
  .whoami button{
    background:none;border:none;color:var(--text-dim);
    text-decoration:underline;cursor:pointer;font-size:10px;font-family:inherit;
  }

  .name-input{
    width:100%;background:var(--cell);border:1px solid var(--cell-border);
    color:var(--text);border-radius:8px;padding:10px;font-size:14px;
    text-align:center;font-family:inherit;
  }
  .name-input:focus{outline:none;border-color:var(--teal);}

  .pin-input{
    width:120px;background:var(--cell);border:1px solid var(--cell-border);
    color:var(--text);border-radius:8px;padding:10px;font-size:20px;
    text-align:center;font-family:'Consolas','Courier New',monospace;
    letter-spacing:8px;
  }
  .pin-input:focus{outline:none;border-color:var(--teal);}
  .pin-hint{font-size:10px;color:var(--text-dim);margin-top:-6px;}
  .form-error{
    color:var(--danger);font-size:11px;min-height:14px;
  }

  /* ---------- Juice: feedback sensorial ---------- */
  @keyframes shakeStrong{
    0%,100%{transform:translate(0,0);}
    20%{transform:translate(-6px,3px);}
    40%{transform:translate(5px,-4px);}
    60%{transform:translate(-4px,-2px);}
    80%{transform:translate(3px,3px);}
  }
  @keyframes shakeSoft{
    0%,100%{transform:translate(0,0);}
    25%{transform:translate(-3px,1px);}
    50%{transform:translate(3px,-2px);}
    75%{transform:translate(-2px,1px);}
  }
  #app.shake-strong{animation:shakeStrong .32s ease;}
  #app.shake-soft{animation:shakeSoft .22s ease;}

  .cell.merge-pop{animation:mergePop .38s cubic-bezier(.34,1.56,.64,1);}
  @keyframes mergePop{
    0%{transform:scale(1);}
    45%{transform:scale(1.35);filter:brightness(1.5);}
    100%{transform:scale(1);}
  }

  .score-popup{
    position:absolute;
    font-family:'Consolas','Courier New',monospace;
    font-weight:700;font-size:13px;color:var(--teal);
    pointer-events:none;z-index:6;
    animation:popupFloat 0.9s ease-out forwards;
    white-space:nowrap;
  }
  .score-popup.combo{color:var(--amber);font-size:15px;}
  @keyframes popupFloat{
    0%{opacity:0;transform:translateY(0) scale(.8);}
    15%{opacity:1;transform:translateY(-6px) scale(1.1);}
    100%{opacity:0;transform:translateY(-38px) scale(1);}
  }

  .wavebar-wrap.danger .wavebar{
    background:linear-gradient(90deg,var(--danger),#ff8a5c);
    animation:dangerGlow .55s ease-in-out infinite;
  }
  @keyframes dangerGlow{
    0%,100%{filter:brightness(1);}
    50%{filter:brightness(1.5);}
  }
  .powerline.danger #power{
    color:var(--danger);
    animation:dangerText .55s ease-in-out infinite;
  }
  @keyframes dangerText{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.15);}
  }

  .streak-badge{
    font-size:11px;color:var(--amber);font-weight:700;
    opacity:0;transition:opacity .25s ease;
    font-family:'Consolas','Courier New',monospace;
  }
  .streak-badge.show{opacity:1;}

  .sound-btn{
    position:absolute;left:0;top:50%;transform:translateY(-50%);
    width:30px;height:30px;border-radius:50%;
    background:var(--cell);border:1px solid var(--cell-border);
    color:var(--text-dim);font-family:inherit;font-size:13px;
    cursor:pointer;line-height:1;touch-action:manipulation;
  }
  .sound-btn:hover{border-color:var(--teal);color:var(--teal);}

  @media (max-width:360px){
    .choice-row{flex-direction:column;}
  }

  @media (min-width:600px) and (max-width:1000px){
    #app{max-width:480px;}
    h1{font-size:26px;}
    .cell{font-size:clamp(20px, 4vw, 30px);}
    .next-tile{width:50px;height:50px;font-size:20px;}
    .choice-btn{padding:16px 12px;font-size:13px;}
  }

  @media (max-width:1000px){
    #leaderboard{
      position:static;transform:none;
      width:100%;max-width:420px;
      margin:24px auto 0;
      border-left:2px solid var(--teal);
      max-height:none;
    }
  }
</style>
</head>
<body>
<div class="layout">
<div id="app">
  <div class="title-row">
    <button id="soundBtn" class="sound-btn" title="Sonido">🔊</button>
    <div class="title">grilla táctica</div>
    <button id="helpBtn" class="help-btn" title="Cómo se juega">?</button>
  </div>
  <h1>N<span>O</span>DO</h1>

  <div class="whoami" id="whoami" style="display:none;">
    <span>Jugando como <b id="whoamiName"></b></span>

  </div>

  <div class="hud">

    <span>Potencia: <b id="power">0</b> / <span id="threshold">0</span></span>

  <div id="grid"></div>

  <div class="bottom">
    <div class="next-wrap">
      <div class="next-label">Siguiente</div>
      <div class="next-tile" id="nextTile">1</div>
    </div>
  </div>
</div>
</div>

<div id="leaderboard">
  <h2>Ranking</h2>
  <div class="sub">Ordenado por rating: puntaje ajustado por cantidad de intentos. A igual puntaje, gana quien lo logró en menos partidas.</div>
  <div id="lbList"><div id="lbEmpty">Cargando…</div></div>
  <div id="lbStatus"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ============================================================
// CONFIGURACIÓN — completar con los datos de tu proyecto Supabase
// (Dashboard > Settings > API). La "anon key" está pensada para
// exponerse en el cliente; la seguridad real la da RLS + la función
// submit_score definida en supabase_schema.sql.
// ============================================================
const SUPABASE_URL = 'https://rabnyiyiaxjhfwlqmnfq.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJhYm55aXlpYXhqaGZ3bHFtbmZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1MzMyMDUsImV4cCI6MjA5OTEwOTIwNX0.CwPQV0GINIa_slIqk1DReCFzstdnkeALbaDpsLf8WH0';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const SIZE = 5;
const CELL_COUNT = SIZE*SIZE;
let board = new Array(CELL_COUNT).fill(0); // 0 = empty, else tier 1..7
let score = 0;
let lives = 3;
let waveIndex = 1;
let threshold = 5;
let waveDuration = 13000; // ms — arranca lento para dar tiempo a entender el loop
let waveStart = performance.now();
let lowStreak = 0; // cuenta tiradas consecutivas de tier 1, para evitar rachas frustrantes
let nextTier = rollTier();
let placedCount = 0;
let gameOver = false;
let paused = true; // arranca pausado hasta que haya un usuario identificado
let currentUser = null; // {name}
let winStreak = 0; // oleadas repelidas seguidas — se rompe si pierdes una
let soundOn = true;
let dangerActive = false;
let lastDangerTick = 0;
let myBestScore = 0; // se sincroniza con el servidor cada vez que se lee el ranking

const ME_KEY = 'nodo_me'; // clave de localStorage (no window.storage: fuera de claude.ai no existe)

const gridEl = document.getElementById('grid');
const scoreEl = document.getElementById('score');
const waveNumEl = document.getElementById('waveNum');
const livesEl = document.getElementById('lives');
const powerEl = document.getElementById('power');
const thresholdEl = document.getElementById('threshold');
const waveTimerEl = document.getElementById('waveTimer');
const nextTileEl = document.getElementById('nextTile');
const msgEl = document.getElementById('msg');
const whoamiEl = document.getElementById('whoami');
const whoamiNameEl = document.getElementById('whoamiName');
const switchUserBtn = document.getElementById('switchUserBtn');
const helpBtn = document.getElementById('helpBtn');
const lbListEl = document.getElementById('lbList');
const lbStatusEl = document.getElementById('lbStatus');
const streakBadgeEl = document.getElementById('streakBadge');
const soundBtn = document.getElementById('soundBtn');
const appEl = document.getElementById('app');
const wavebarWrapEl = document.querySelector('.wavebar-wrap');
const powerlineEl = document.querySelector('.powerline');

// ---------- Audio sintetizado (sin archivos externos) ----------
let audioCtx = null;
function ensureAudio(){
  if(!audioCtx){
    try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e){ soundOn = false; }
  }
  if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function beep(freq, dur, type, vol){
  if(!soundOn) return;
  ensureAudio();
  if(!audioCtx) return;
  const t0 = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.setValueAtTime(freq, t0);
  gain.gain.setValueAtTime(0, t0);
  gain.gain.linearRampToValueAtTime(vol!=null?vol:0.12, t0+0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t0);
  osc.stop(t0+dur+0.02);
}
function sfxPlace(){ beep(320, 0.08, 'triangle', 0.08); }
function sfxMerge(tier){ beep(260 + tier*45, 0.14, 'square', 0.10); }
function sfxChain(step){ beep(500 + step*90, 0.12, 'sine', 0.12); }
function sfxWaveWin(){ beep(440,0.1,'triangle',0.12); setTimeout(()=>beep(660,0.16,'triangle',0.13),90); }
function sfxWaveLose(){ beep(160,0.28,'sawtooth',0.14); setTimeout(()=>beep(100,0.3,'sawtooth',0.12),100); }
function sfxDangerTick(){ beep(880,0.05,'square',0.05); }
function sfxGameOver(){ beep(200,0.35,'sawtooth',0.15); setTimeout(()=>beep(140,0.5,'sawtooth',0.14),150); }

function vibrate(pattern){
  try{ if(navigator.vibrate) navigator.vibrate(pattern); }catch(e){}
}

soundBtn.addEventListener('click', ()=>{
  soundOn = !soundOn;
  soundBtn.textContent = soundOn ? '🔊' : '🔇';
  if(soundOn) ensureAudio();
});

// ---------- Screen shake ----------
function shake(strong){
  appEl.classList.remove('shake-strong','shake-soft');
  void appEl.offsetWidth;
  appEl.classList.add(strong ? 'shake-strong' : 'shake-soft');
}

// ---------- Popups de puntaje flotante ----------
function scorePopup(cellIdx, text, isCombo){
  const cellEl = gridEl.children[cellIdx];
  if(!cellEl) return;
  const pop = document.createElement('div');
  pop.className = 'score-popup' + (isCombo ? ' combo' : '');
  pop.textContent = text;
  pop.style.left = cellEl.offsetLeft + cellEl.offsetWidth/2 + 'px';
  pop.style.top = cellEl.offsetTop + 'px';
  pop.style.transform = 'translateX(-50%)';
  gridEl.appendChild(pop);
  setTimeout(()=>pop.remove(), 950);
}

function rollTier(){
  // corta-rachas: si ya salieron 3 tier-1 seguidos, la próxima es al menos tier 2
  if(lowStreak >= 3){
    lowStreak = 0;
    return Math.random() < 0.7 ? 2 : 3;
  }
  const r = Math.random();
  let t;
  if(r < 0.62) t = 1;
  else if(r < 0.90) t = 2;
  else t = 3;
  lowStreak = (t === 1) ? lowStreak + 1 : 0;
  return t;
}

function cellClass(t){
  return 'tier' + Math.min(t,7);
}

function buildGrid(){
  gridEl.innerHTML = '';
  for(let i=0;i<CELL_COUNT;i++){
    const c = document.createElement('div');
    c.className = 'cell empty';
    c.dataset.i = i;
    c.addEventListener('click', ()=>onCellClick(i));
    gridEl.appendChild(c);
  }
}

function render(){
  board.forEach((t,i)=>{
    const c = gridEl.children[i];
    if(!c) return;
    c.className = 'cell ' + (t===0?'empty':'filled') + (t>0?(' '+cellClass(t)):'');
    c.textContent = t>0 ? t : '';
  });
  scoreEl.textContent = score;
  waveNumEl.textContent = waveIndex;
  livesEl.textContent = '♥ '.repeat(lives).trim();
  nextTileEl.textContent = nextTier;
  nextTileEl.className = 'next-tile ' + cellClass(nextTier);
  const power = board.reduce((a,b)=>a+b,0);
  powerEl.textContent = power;
  thresholdEl.textContent = threshold;
}

function neighbors(i){
  const row = Math.floor(i/SIZE), col = i%SIZE;
  const res = [];
  if(row>0) res.push(i-SIZE);
  if(row<SIZE-1) res.push(i+SIZE);
  if(col>0) res.push(i-1);
  if(col<SIZE-1) res.push(i+1);
  return res;
}

function resolveMerges(startIdx){
  let queue = [startIdx];
  let mergedAny = false;
  let chainStep = 0;
  while(queue.length){
    const idx = queue.shift();
    const t = board[idx];
    if(t===0) continue;
    for(const n of neighbors(idx)){
      if(board[n] === t){
        board[n] = 0;
        board[idx] = t+1;
        mergedAny = true;
        chainStep++;
        const gained = (t+1)*5 * chainStep; // cada eslabón de la cadena vale más
        score += gained;
        scorePopup(idx, '+' + gained, chainStep>1);
        if(chainStep>1) sfxChain(chainStep); else sfxMerge(t+1);
        queue.push(idx);
        break;
      }
    }
  }
  if(mergedAny){
    const cellEl = gridEl.children[startIdx];
    if(cellEl){ cellEl.classList.remove('merge-pop'); void cellEl.offsetWidth; cellEl.classList.add('merge-pop'); }
    if(chainStep >= 2){
      shake(chainStep >= 3);
      vibrate(chainStep >= 3 ? [15,30,15] : 12);
      scorePopup(startIdx, '¡Cadena x'+chainStep+'!', true);
    }
  }
  return mergedAny;
}

function canAnyMerge(){
  for(let i=0;i<CELL_COUNT;i++){
    if(board[i]===0) continue;
    for(const n of neighbors(i)){
      if(board[n]===board[i]) return true;
    }
  }
  return false;
}

function hasEmpty(){
  return board.includes(0);
}

function onCellClick(i){
  if(gameOver || paused) return;
  if(board[i] !== 0) return;
  board[i] = nextTier;
  sfxPlace();
  vibrate(6);
  resolveMerges(i);
  placedCount++;
  render();
  const cellEl = gridEl.children[i];
  if(cellEl){
    cellEl.classList.remove('pulse');
    void cellEl.offsetWidth; // reinicia animación
    cellEl.classList.add('pulse');
  }

  if(!hasEmpty() && !canAnyMerge()){
    endGame('La grilla se saturó. Sin espacio, sin fusiones posibles.');
    return;
  }

  if(placedCount % 6 === 0){
    showChoice();
  } else {
    nextTier = rollTier();
    render();
  }
}

function showChoice(){
  paused = true;
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="overlay-card">
      <h2>Decisión</h2>
      <p>Podés arriesgar por más potencia o jugar seguro.</p>
      <div class="choice-row">
        <button class="choice-btn" id="riskBtn"><b>Arriesgar</b>Próxima pieza +2 tiers, pero la oleada actual sube 40% de umbral</button>
        <button class="choice-btn" id="safeBtn"><b>Jugar seguro</b>Próxima pieza garantizada tier 2 o 3, sin subir el umbral</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  document.getElementById('riskBtn').onclick = ()=>{
    nextTier = Math.min(rollTier()+2, 7);
    threshold = Math.round(threshold*1.4);
    overlay.remove();
    paused = false;
    render();
  };
  document.getElementById('safeBtn').onclick = ()=>{
    nextTier = Math.random() < 0.6 ? 2 : 3;
    overlay.remove();
    paused = false;
    render();
  };
}

let pauseStart = 0;
let pausedAccum = 0;

function tickWave(now){
  if(gameOver) return;
  if(paused){
    if(pauseStart === 0) pauseStart = now;
    return;
  }
  if(pauseStart !== 0){
    pausedAccum += now - pauseStart;
    pauseStart = 0;
  }
  const elapsed = now - waveStart - pausedAccum;
  const pct = Math.min(elapsed / waveDuration, 1);
  waveTimerEl.style.transform = 'scaleX(' + pct + ')';

  const power = board.reduce((a,b)=>a+b,0);
  const shouldPanic = pct >= 0.72 && power < threshold;
  if(shouldPanic !== dangerActive){
    dangerActive = shouldPanic;
    wavebarWrapEl.classList.toggle('danger', dangerActive);
    powerlineEl.classList.toggle('danger', dangerActive);
  }
  if(dangerActive){
    const tickGap = Math.max(120, 550 - (pct-0.72)*2200); // se acelera al acercarse al límite
    if(now - lastDangerTick > tickGap){
      lastDangerTick = now;
      sfxDangerTick();
      vibrate(8);
    }
  }

  if(pct >= 1){
    resolveWave();
  }
}

function resolveWave(){
  dangerActive = false;
  wavebarWrapEl.classList.remove('danger');
  powerlineEl.classList.remove('danger');
  const power = board.reduce((a,b)=>a+b,0);
  if(power >= threshold){
    winStreak++;
    const streakBonus = winStreak >= 2 ? Math.round(threshold * 0.15 * Math.min(winStreak-1,8)) : 0;
    score += threshold * 3 + streakBonus;
    msgEl.textContent = streakBonus>0 ? `Oleada repelida ✓ (+racha)` : 'Oleada repelida ✓';
    msgEl.style.color = 'var(--teal)';
    waveIndex++;
    sfxWaveWin();
    vibrate([10,20,10]);
    if(winStreak >= 2){
      streakBadgeEl.textContent = '🔥 Racha x' + winStreak;
      streakBadgeEl.classList.add('show');
    }
    // Crecimiento suave al principio, se acelera después de la oleada 6
    const rampFactor = waveIndex <= 6 ? 1.12 : 1.12 + (waveIndex-6)*0.015;
    threshold = Math.round(threshold * rampFactor) + Math.ceil(waveIndex*0.4);
  } else {
    lives--;
    winStreak = 0;
    streakBadgeEl.classList.remove('show');
    msgEl.textContent = 'Oleada te superó — perdiste una unidad clave';
    msgEl.style.color = 'var(--danger)';
    sfxWaveLose();
    vibrate([40,30,40]);
    shake(true);
    removeStrongestTile();
    if(lives <= 0){
      sfxGameOver();
      endGame('Tres oleadas te superaron. La grilla cayó.');
      return;
    }
  }
  waveDuration = Math.max(6500, waveDuration - 50);
  waveStart = performance.now();
  pausedAccum = 0;
  pauseStart = 0;
  render();
  setTimeout(()=>{ if(!gameOver) msgEl.textContent=''; }, 1800);
}

function removeStrongestTile(){
  let best = -1, bestVal = -1;
  board.forEach((t,i)=>{ if(t>bestVal){ bestVal=t; best=i; } });
  if(best>=0){
    const cellEl = gridEl.children[best];
    if(cellEl) cellEl.classList.add('flash-out');
    board[best] = 0;
  }
}

function endGame(reason){
  gameOver = true;
  const isNewRecord = currentUser && score > myBestScore;
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="overlay-card">
      <h2>Fin de partida</h2>
      <p>${reason}</p>
      <p style="color:var(--amber);font-size:16px;font-weight:700;">Score final: ${score} — Oleada ${waveIndex}</p>
      ${isNewRecord ? '<p style="color:var(--teal);font-size:13px;font-weight:700;">🏆 ¡Nuevo récord personal!</p>' : ''}
      <p id="saveStatus" class="save-status" style="font-size:11px;color:var(--text-dim);min-height:14px;">${currentUser ? 'Guardando resultado…' : ''}</p>
      <button class="restart-btn" id="restartBtn" ${currentUser ? 'disabled' : ''}>Reintentar</button>
    </div>
  `;
  document.body.appendChild(overlay);
  const restartBtn = document.getElementById('restartBtn');
  const saveStatusEl = document.getElementById('saveStatus');

  if(!currentUser){
    restartBtn.onclick = ()=>location.reload();
    return;
  }

  let saved = false;
  restartBtn.onclick = ()=>{
    if(saved){ location.reload(); return; }
    trySave();
  };

  async function trySave(){
    restartBtn.disabled = true;
    restartBtn.textContent = 'Guardando…';
    const { ok, errMsg } = await reportGameResult(score);
    if(ok){
      saved = true;
      saveStatusEl.textContent = isNewRecord ? '🏆 Récord actualizado en el ranking.' : 'Resultado guardado.';
      saveStatusEl.style.color = 'var(--teal)';
      restartBtn.disabled = false;
      restartBtn.textContent = 'Reintentar';
    } else {
      saveStatusEl.textContent = 'No se guardó: ' + errMsg;
      saveStatusEl.style.color = 'var(--danger)';
      restartBtn.disabled = false;
      restartBtn.textContent = 'Reintentar guardado';
    }
  }
  trySave();
}

function loop(now){
  tickWave(now);
  requestAnimationFrame(loop);
}

// ---------- Usuario y ranking persistente ----------

function ratingOf(entry){
  const attempts = Math.max(entry.attempts || 0, 1);
  return entry.bestScore / Math.pow(attempts, 0.3);
}

async function loadLeaderboardRows(){
  const { data, error } = await sb
    .from('leaderboard')
    .select('name,best_score,attempts')
    .order('best_score', { ascending: false })
    .limit(200);
  if(error){ throw error; }
  return data || [];
}

async function renderLeaderboard(){
  let rows;
  try{
    rows = await loadLeaderboardRows();
  }catch(e){
    lbListEl.innerHTML = '';
    lbStatusEl.textContent = 'Ranking no disponible ahora mismo.';
    return;
  }
  if(rows.length === 0){
    lbListEl.innerHTML = '<div id="lbEmpty">Todavía nadie jugó. Sé el primero.</div>';
    lbStatusEl.textContent = '';
    return;
  }
  const entries = rows.map(r => ({ name: r.name, bestScore: r.best_score, attempts: r.attempts }));
  if(currentUser){
    const mine = entries.find(e => e.name === currentUser.name);
    myBestScore = mine ? mine.bestScore : 0;
  }
  entries.sort((a,b)=> ratingOf(b) - ratingOf(a));
  const top = entries.slice(0, 15);
  const medals = ['👑','🥈','🥉'];
  lbListEl.innerHTML = top.map((e,idx)=>{
    const isMe = currentUser && e.name === currentUser.name;
    const rankDisplay = idx < 3
      ? `<div class="lb-rank medal">${medals[idx]}</div>`
      : `<div class="lb-rank">${idx+1}</div>`;
    return `<div class="lb-row ${isMe?'me':''}">
      ${rankDisplay}
      <div>
        <div class="lb-name">${escapeHtml(e.name)}</div>
        <div class="lb-meta">${e.bestScore} pts · ${e.attempts} intento${e.attempts===1?'':'s'}</div>
      </div>
      <div class="lb-rating">${Math.round(ratingOf(e))}</div>
    </div>`;
  }).join('');
  lbStatusEl.textContent = '';
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function reportGameResult(finalScore){
  let ok = true;
  let errMsg = '';
  const expectedMin = Math.max(finalScore, myBestScore); // lo que debería quedar guardado como mínimo
  try{
    const { error } = await sb.rpc('submit_score', {
      p_name: currentUser.name,
      p_pin: currentUser.pin,
      p_score: finalScore
    });
    if(error) throw error;

    // Verificación real: no confiamos en "sin error = guardado".
    // Releemos la fila del servidor y confirmamos que el best_score quedó como corresponde.
    const { data: verifyRows, error: verifyError } = await sb
      .from('leaderboard')
      .select('best_score')
      .eq('name', currentUser.name)
      .limit(1);
    if(verifyError) throw verifyError;
    const savedBest = (verifyRows && verifyRows[0]) ? verifyRows[0].best_score : null;
    if(savedBest === null || savedBest < expectedMin){
      ok = false; // el RPC no tiró error, pero el valor en el servidor no refleja el score enviado
      errMsg = 'El servidor no confirmó el guardado del puntaje.';
    }
  }catch(e){
    ok = false;
    errMsg = (e && e.message) ? e.message : 'Error de conexión con el servidor.';
  }
  await renderLeaderboard();
  return { ok, errMsg };
}

// Se suscribe a cambios en vivo: si otro jugador reporta un puntaje,
// el ranking se actualiza solo, sin recargar la página.
function subscribeLeaderboardRealtime(){
  try{
    sb.channel('leaderboard-changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'leaderboard' }, () => {
        renderLeaderboard();
      })
      .subscribe();
  }catch(e){ /* si realtime no está disponible, el ranking igual se actualiza al terminar cada partida propia */ }
}

function startGameForUser(name, pin){
  currentUser = {name, pin};
  whoamiEl.style.display = 'flex';
  whoamiNameEl.textContent = name;
  paused = false;
  waveStart = performance.now();
  pausedAccum = 0;
  pauseStart = 0;
  render();
  renderLeaderboard();
}

function showNameEntry(prefillError){
  paused = true;
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="overlay-card">
      <h2>Ingresá tu nombre y PIN</h2>
      <p><b style="color:var(--teal);">¿Ya jugaste antes?</b> Escribí el mismo nombre y PIN que usaste la última vez para seguir con tu cuenta.<br><br><b style="color:var(--amber);">¿Primera vez?</b> Elegí un nombre y un PIN de 4 dígitos — quedan reservados automáticamente para vos.</p>
      <input class="name-input" id="nameInput" maxlength="14" placeholder="Tu nombre" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false">
      <input class="pin-input" id="pinInput" maxlength="4" placeholder="••••" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
      <div class="pin-hint">Solo números, 4 dígitos.</div>
      <div class="form-error" id="formError">${prefillError || ''}</div>
      <button class="restart-btn" id="nameConfirmBtn">Entrar</button>
    </div>
  `;
  document.body.appendChild(overlay);
  const nameInput = document.getElementById('nameInput');
  const pinInput = document.getElementById('pinInput');
  const errorEl = document.getElementById('formError');
  nameInput.focus();
  pinInput.addEventListener('input', ()=>{
    pinInput.value = pinInput.value.replace(/[^0-9]/g,'').slice(0,4);
  });

  let submitting = false;
  const confirm = async ()=>{
    if(submitting) return;
    const name = (nameInput.value || '').trim().slice(0,14);
    const pin = pinInput.value.trim();
    if(!name){ errorEl.textContent = 'Poné un nombre.'; return; }
    if(!/^[0-9]{4}$/.test(pin)){ errorEl.textContent = 'El PIN tiene que ser de 4 números.'; return; }

    submitting = true;
    errorEl.textContent = '';
    try{
      const { data, error } = await sb.rpc('register_or_auth', { p_name: name, p_pin: pin });
      if(error) throw error;
      try{
        localStorage.setItem(ME_KEY, JSON.stringify({name, pin}));
      }catch(e){ /* sigue igual sin persistir localmente */ }
      overlay.remove();
      startGameForUser(name, pin);
      if(data === true){
        // nombre recién reservado: mostramos el instructivo antes de largar
        showInstructions(true);
      }
    }catch(e){
      errorEl.textContent = (e && e.message) ? e.message : 'No se pudo validar. Probá de nuevo.';
    }finally{
      submitting = false;
    }
  };
  document.getElementById('nameConfirmBtn').onclick = confirm;
  pinInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') confirm(); });
  nameInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') pinInput.focus(); });
}

async function initUser(){
  let stored = null;
  try{
    const raw = localStorage.getItem(ME_KEY);
    if(raw) stored = JSON.parse(raw);
  }catch(e){ /* no había usuario guardado */ }

  if(stored && stored.name && stored.pin){
    try{
      const { error } = await sb.rpc('register_or_auth', { p_name: stored.name, p_pin: stored.pin });
      if(error) throw error;
      startGameForUser(stored.name, stored.pin);
      return;
    }catch(e){
      try{ localStorage.removeItem(ME_KEY); }catch(e2){}
      showNameEntry('Tu sesión guardada ya no es válida. Iniciá de nuevo.');
      return;
    }
  }
  showNameEntry();
}

switchUserBtn.addEventListener('click', ()=>{
  try{ localStorage.removeItem(ME_KEY); }catch(e){}
  location.reload();
});

function showInstructions(isFirstTime){

  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="overlay-card">
      ${HOWTO_HTML}
      <button class="restart-btn" id="howtoCloseBtn">${isFirstTime ? 'A jugar' : 'Cerrar'}</button>
    </div>
  `;

  document.getElementById('howtoCloseBtn').onclick = ()=>{
    overlay.remove();
    paused = false; // tickWave ya contempla el tiempo pausado vía pausedAccum

helpBtn.addEventListener('click', ()=>{
  if(gameOver || !currentUser) return;
  showInstructions(false);
});

buildGrid();
render();
requestAnimationFrame(loop);
subscribeLeaderboardRealtime();
initUser();
</script>
